name: Conan create ros-kilted

on:
  pull_request:

jobs:
  conan-create:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Enable long paths for git
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2.2
        with:
          cmake-version: "3.31.0"

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          update-environment: false

      - name: Prepend Python to System PATH
        run: echo "$(dirname ${{ steps.setup_python.outputs.python-path }})" >> $GITHUB_PATH

      - name: Install latest Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan
          conan --version

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Add local recipes index
        working-directory: ${{ github.workspace }}
        run: conan remote add conan-ros-index . --type=local-recipes-index

      - name: Conan create
        working-directory: ${{ github.workspace }}
        run: conan create recipes/ros-kilted/all --version=0.1.0 --build=missing -s compiler.cppstd=17

      - name: Run examples (ci-commands.sh in each example folder)
        shell: bash
        run: bash "${{ github.workspace }}/.github/workflows/run-example-tests.sh"
